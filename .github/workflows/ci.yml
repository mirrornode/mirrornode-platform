name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: pnpm install  # or npm install, as appropriate

      - name: Lint
        run: pnpm run lint  # or your preferred lint command

      - name: Build
        run: pnpm run build
